---
layout: default
---

<link rel="stylesheet" href="/css/review.css">

</head>

<body>

<article class="review">

<header class="review-header">

<h1>{{ page.title }}</h1>

<p class="review-date">
  {{ page.date | date: "%-d %B %Y" }}
</p>

</header>

<section class="review-content">
{{ content }}
</section>

<div class="review-stats">
    <h2>Final rating: {{ page.rating }}</h2>
    <i style="font-size: 0.5em; color: #555;">The rating relates only to the dartboard set-up, not the pub as a whole.</i>
</div>

<div id="map" style="height:600px;"></div>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([51.4545, -2.5879], 12);
var ReviewedIcon = L.divIcon({
        html: "🎯",          // Dartboard emoji
        className: "dart-icon",
        iconSize: [30, 30],       // width, height of the div
        iconAnchor: [15, 30]       // point of the icon that corresponds to the lat/lon
    });

var unReviewedIcon = L.icon({
    iconUrl: '/images/dart_icon.png',
    iconSize: [20, 20],    // size of the icon
    iconAnchor: [10, 20],  // point that corresponds to lat/lon
    popupAnchor: [0, -20]  // point from which the popup opens
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

{% for post in site.posts %}
{% if post.lat %}
L.marker([{{ post.lat }}, {{ post.lon }}], {icon: ReviewedIcon})
.addTo(map)
.bindPopup("<b>{{ post.pub }}</b><br><a href='{{ post.url }}'>Read review</a>");

{% endif %}
{% endfor %}


var unreviewedPubs = [
    { name: "The Crown Tavern", lat: 51.4585655, lon: -2.5787093},
    { name: "The Swan with Two Necks", lat: 51.459065, lon: -2.579258 },
    { name: "The Sandringham", lat: 51.440920, lon: -2.555457 }
];

unreviewedPubs.forEach(function(pub) {
    L.marker([pub.lat, pub.lon], {icon: unReviewedIcon})
     .addTo(map)
     .bindPopup("<b>" + pub.name + "</b><br><i>Not reviewed yet</i>");
});

</script>

</article>

</body>
</html>
